<rect x="259" y="332" width="162" height="56" rx="8" fill="#f8f9fb" stroke="#d1d5db"/>
<text x="340" y="356" font-size="13" font-weight="500" fill="#111827" text-anchor="middle">CRPEcosystemRegistry</text>
<text x="340" y="374" font-size="11" fill="#6b7280" text-anchor="middle" font-family="monospace">0x152E…179C8</text>

<line x1="30" y1="420" x2="650" y2="420" stroke="#e5e7eb" stroke-width="1"/>
<text x="30" y="442" font-size="11" fill="#9ca3af">Arrow = constructor reference / control flow. All on BSC mainnet, compiler v0.8.24, optimizer 200, MIT.</text>
